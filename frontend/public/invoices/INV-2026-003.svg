<svg xmlns="http://www.w3.org/2000/svg" width="600" height="820" viewBox="0 0 600 820">
  <rect width="600" height="820" fill="#fff" stroke="#ccc" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="600" height="80" fill="#7b2d2d"/>
  <text x="30" y="38" font-size="22" font-weight="bold" fill="#fff" font-family="Arial">耗材供應商 C</text>
  <text x="30" y="62" font-size="13" fill="#ffb3b3" font-family="Arial">Stationery C Co., Ltd. | 統編: 55566677</text>
  <text x="420" y="38" font-size="13" fill="#fff" font-family="Arial">電話: 07-3456-7890</text>
  <text x="420" y="58" font-size="13" fill="#fff" font-family="Arial">Email: ar@stationeryc.tw</text>

  <!-- Invoice title -->
  <text x="300" y="120" font-size="28" font-weight="bold" fill="#7b2d2d" text-anchor="middle" font-family="Arial">發　票　Invoice</text>
  <line x1="30" y1="130" x2="570" y2="130" stroke="#7b2d2d" stroke-width="2"/>

  <!-- Invoice meta -->
  <text x="40" y="158" font-size="13" fill="#333" font-family="Arial">發票號碼 Invoice No.:</text>
  <text x="220" y="158" font-size="13" font-weight="bold" fill="#000" font-family="Arial">INV-2026-003</text>
  <text x="380" y="158" font-size="13" fill="#333" font-family="Arial">發票日期:</text>
  <text x="460" y="158" font-size="13" fill="#000" font-family="Arial">2026-03-22</text>

  <text x="40" y="180" font-size="13" fill="#333" font-family="Arial">採購單號 PO No.:</text>
  <text x="220" y="180" font-size="13" font-weight="bold" fill="#000" font-family="Arial">PO-8803</text>
  <text x="380" y="180" font-size="13" fill="#333" font-family="Arial">付款條件:</text>
  <text x="460" y="180" font-size="13" fill="#000" font-family="Arial">Net 15</text>

  <text x="40" y="202" font-size="13" fill="#333" font-family="Arial">買受人:</text>
  <text x="220" y="202" font-size="13" fill="#000" font-family="Arial">ABC 企業股份有限公司</text>

  <!-- Section: Items -->
  <rect x="30" y="220" width="540" height="28" fill="#7b2d2d" rx="3"/>
  <text x="40" y="239" font-size="12" fill="#fff" font-weight="bold" font-family="Arial">品項 Item</text>
  <text x="240" y="239" font-size="12" fill="#fff" font-weight="bold" font-family="Arial">數量 Qty</text>
  <text x="320" y="239" font-size="12" fill="#fff" font-weight="bold" font-family="Arial">單價 Unit Price</text>
  <text x="450" y="239" font-size="12" fill="#fff" font-weight="bold" font-family="Arial">小計 Amount</text>

  <!-- Row 1 (數量不符: PO=30箱, 發票開33箱) -->
  <rect x="30" y="248" width="540" height="50" fill="#fff0f0"/>
  <text x="40" y="268" font-size="13" fill="#000" font-family="Arial">A4 影印紙 (箱裝, 5包/箱)</text>
  <text x="40" y="286" font-size="11" fill="#666" font-family="Arial">品牌: Double A | 規格: 80g/m²</text>
  <!-- 數量超標: PO=30, 但發票開33 -->
  <text x="252" y="275" font-size="13" fill="#c0392b" font-weight="bold" font-family="Arial" text-anchor="middle">33</text>
  <!-- 單價不符: PO=$800, 但發票開$1,100 -->
  <text x="370" y="275" font-size="13" fill="#c0392b" font-weight="bold" font-family="Arial" text-anchor="middle">$1,100</text>
  <text x="510" y="275" font-size="13" font-weight="bold" fill="#c0392b" font-family="Arial" text-anchor="middle">$36,300</text>

  <!-- Row 2 (正常) -->
  <rect x="30" y="298" width="540" height="50" fill="#f8f9fa"/>
  <text x="40" y="318" font-size="13" fill="#000" font-family="Arial">訂書機 (大型) HD-50</text>
  <text x="40" y="336" font-size="11" fill="#666" font-family="Arial">品牌: MAX | 適用: 50頁以下</text>
  <text x="252" y="325" font-size="13" fill="#000" font-family="Arial" text-anchor="middle">10</text>
  <text x="370" y="325" font-size="13" fill="#000" font-family="Arial" text-anchor="middle">$450</text>
  <text x="510" y="325" font-size="13" font-weight="bold" fill="#000" font-family="Arial" text-anchor="middle">$4,500</text>

  <!-- Mismatch warning -->
  <rect x="30" y="355" width="540" height="28" fill="#f8d7da" rx="3"/>
  <text x="44" y="374" font-size="11" fill="#721c24" font-family="Arial">❌ 三方對帳異常：第一行數量及單價均與採購單不符，請查核。</text>

  <!-- Divider -->
  <line x1="30" y1="383" x2="570" y2="383" stroke="#dee2e6" stroke-width="1"/>

  <!-- Subtotal area -->
  <text x="370" y="415" font-size="13" fill="#333" font-family="Arial">小計 Subtotal:</text>
  <text x="510" y="415" font-size="13" fill="#c0392b" font-family="Arial" text-anchor="middle">$40,800</text>

  <text x="370" y="438" font-size="13" fill="#333" font-family="Arial">稅額 Tax (5%):</text>
  <text x="510" y="438" font-size="13" fill="#000" font-family="Arial" text-anchor="middle">$2,040</text>

  <rect x="330" y="447" width="240" height="30" fill="#7b2d2d" rx="3"/>
  <text x="370" y="467" font-size="14" font-weight="bold" fill="#fff" font-family="Arial">總計 Total:</text>
  <text x="510" y="467" font-size="14" font-weight="bold" fill="#fff" font-family="Arial" text-anchor="middle">$42,840</text>

  <!-- Bank info -->
  <rect x="30" y="500" width="540" height="90" fill="#f8f9fa" rx="5" stroke="#dee2e6" stroke-width="1"/>
  <text x="44" y="522" font-size="12" font-weight="bold" fill="#333" font-family="Arial">匯款資訊 Bank Details</text>
  <text x="44" y="542" font-size="12" fill="#555" font-family="Arial">銀行: 合作金庫 | 帳號: 006-345-678901</text>
  <text x="44" y="562" font-size="12" fill="#555" font-family="Arial">戶名: 耗材供應商 C 股份有限公司</text>
  <text x="44" y="582" font-size="12" fill="#555" font-family="Arial">SWIFT: TACBTWTP</text>

  <!-- Notes -->
  <text x="44" y="620" font-size="12" fill="#333" font-family="Arial">備註: 依採購單 PO-8803 開立，含本次補貨 3 箱調整費用。</text>
  <text x="44" y="638" font-size="11" fill="#888" font-family="Arial">如有異議請在 7 日內通知，逾期視為同意。</text>

  <!-- Signature -->
  <text x="380" y="700" font-size="12" fill="#333" font-family="Arial">授權簽章 Authorized Signature:</text>
  <line x1="380" y1="730" x2="570" y2="730" stroke="#333" stroke-width="1.5"/>
  <text x="420" y="746" font-size="11" fill="#666" font-family="Arial">業務總監 / Sales Director</text>

  <!-- Stamp -->
  <circle cx="140" cy="720" r="52" fill="none" stroke="#7b2d2d" stroke-width="2.5" opacity="0.7"/>
  <circle cx="140" cy="720" r="44" fill="none" stroke="#7b2d2d" stroke-width="1" opacity="0.5"/>
  <text x="140" y="716" font-size="11" fill="#7b2d2d" text-anchor="middle" font-family="Arial" opacity="0.8" font-weight="bold">耗材供應商 C</text>
  <text x="140" y="732" font-size="10" fill="#7b2d2d" text-anchor="middle" font-family="Arial" opacity="0.8">STATIONERY C</text>

  <!-- Footer -->
  <line x1="0" y1="780" x2="600" y2="780" stroke="#dee2e6" stroke-width="1"/>
  <text x="300" y="800" font-size="10" fill="#999" text-anchor="middle" font-family="Arial">耗材供應商 C Co., Ltd. | 高雄市前鎮區中山三路 55 號 | www.stationeryc.tw</text>
</svg>
