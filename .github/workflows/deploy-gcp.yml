name: Deploy to Google Cloud Run

on:
  workflow_dispatch:

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'asia-east1' }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'intelligent-invoice' }}
  BACKEND_SERVICE: ${{ vars.BACKEND_SERVICE || 'invoice-backend' }}
  FRONTEND_SERVICE: ${{ vars.FRONTEND_SERVICE || 'invoice-frontend' }}

jobs:
  test:
    name: Test and Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install backend test dependencies
        working-directory: backend
        run: pip install -r requirements-test.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -v --tb=short

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE: /api
          VITE_API_MOCK_ENABLED: "false"
          VITE_DISABLE_ACCESS_MANAGEMENT: "false"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          VITE_API_MOCK_ENABLED: "true"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  deploy:
    name: Build Images and Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Set image names
        id: images
        run: |
          REGISTRY="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}"
          echo "backend=${REGISTRY}/backend:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "frontend=${REGISTRY}/frontend:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        run: |
          docker build --target production -t "${{ steps.images.outputs.backend }}" backend
          docker push "${{ steps.images.outputs.backend }}"

      - name: Deploy backend
        run: |
          gcloud run deploy "${{ env.BACKEND_SERVICE }}" \
            --image "${{ steps.images.outputs.backend }}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300 \
            --set-env-vars ALLOW_DEV_FALLBACK=0 \
            --set-env-vars CORS_ORIGINS="${{ secrets.FRONTEND_ORIGIN }}" \
            --set-secrets SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,SUPABASE_JWT_SECRET=SUPABASE_JWT_SECRET:latest

      - name: Resolve backend URL
        id: backend
        run: |
          BACKEND_URL="$(gcloud run services describe "${{ env.BACKEND_SERVICE }}" --region "${{ env.GCP_REGION }}" --format='value(status.url)')"
          echo "url=${BACKEND_URL}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg VITE_API_BASE="${{ steps.backend.outputs.url }}" \
            --build-arg VITE_API_MOCK_ENABLED=false \
            --build-arg VITE_DISABLE_ACCESS_MANAGEMENT=false \
            --build-arg VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
            --build-arg VITE_SUPABASE_PUBLISHABLE_KEY="${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -t "${{ steps.images.outputs.frontend }}" frontend
          docker push "${{ steps.images.outputs.frontend }}"

      - name: Deploy frontend
        run: |
          gcloud run deploy "${{ env.FRONTEND_SERVICE }}" \
            --image "${{ steps.images.outputs.frontend }}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 80
